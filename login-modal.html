<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Modal — Hanbin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: #2d0f2a;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
  }

  body::before {
    content:''; position:fixed; inset:0; pointer-events:none;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%, rgba(201,123,138,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 90% 100%, rgba(122,171,142,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(74,25,66,0.5) 0%, transparent 70%);
  }

  body::after {
    content:''; position:fixed; inset:0; pointer-events:none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    opacity:0.4;
  }

  .open-btn {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 12px 28px; border-radius: 40px;
    background: rgba(201,123,138,0.18);
    border: 1px solid rgba(201,123,138,0.35);
    color: #f5e6d3; font-family: 'DM Sans', sans-serif;
    font-size: 13px; letter-spacing: 0.08em; cursor: pointer;
    transition: all 0.2s; z-index: 1;
  }
  .open-btn:hover { background: rgba(201,123,138,0.28); }

  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
  @keyframes slideUp { from{opacity:0;transform:translateY(28px) scale(0.96)} to{opacity:1;transform:translateY(0) scale(1)} }

  .overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(18,6,18,0.78);
    backdrop-filter: blur(14px);
    display: flex; align-items: center; justify-content: center;
    animation: fadeIn 0.25s ease;
  }
  .overlay.hidden { display: none; }

  .modal {
    width: 420px; border-radius: 24px;
    background: linear-gradient(145deg, rgba(74,25,66,0.96), rgba(45,15,42,0.99));
    border: 1px solid rgba(201,123,138,0.28);
    box-shadow: 0 40px 80px rgba(0,0,0,0.55), 0 0 0 1px rgba(201,123,138,0.07);
    padding: 44px 40px 40px;
    position: relative; overflow: hidden;
    animation: slideUp 0.32s cubic-bezier(0.34,1.56,0.64,1);
    z-index: 2;
  }
  .modal::before {
    content:''; position:absolute; top:-60px; right:-60px;
    width:200px; height:200px; border-radius:50%;
    background: radial-gradient(circle, rgba(201,123,138,0.16), transparent 70%);
    pointer-events:none;
  }
  .modal::after {
    content:'✦'; position:absolute; bottom:14px; right:22px;
    font-size:52px; color:rgba(201,123,138,0.07); pointer-events:none;
  }

  .close-btn {
    position:absolute; top:16px; right:16px;
    width:32px; height:32px; border-radius:50%;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(232,196,184,0.15);
    color:rgba(245,230,211,0.45); font-size:18px;
    cursor:pointer; transition:all 0.2s;
    display:flex; align-items:center; justify-content:center;
  }
  .close-btn:hover { color:#f5e6d3; border-color:rgba(201,123,138,0.45); background:rgba(201,123,138,0.1); }

  .modal-emoji { font-size:28px; margin-bottom:10px; }
  .modal-title {
    font-family:'Cormorant Garamond', serif;
    font-size:30px; font-weight:300; font-style:italic;
    color:#f5e6d3; letter-spacing:0.02em; margin-bottom:6px;
  }
  .modal-sub {
    font-size:11px; letter-spacing:0.18em; text-transform:uppercase;
    color:rgba(245,230,211,0.38); margin-bottom:32px;
  }

  .field { margin-bottom:10px; }
  .field-label {
    display:flex; justify-content:space-between; align-items:center;
    font-size:11px; letter-spacing:0.15em; text-transform:uppercase;
    color:rgba(245,230,211,0.4); margin-bottom:8px;
  }
  .required { color:#ff6b8a; }
  .counter {
    font-size:10px; color:rgba(245,230,211,0.22);
    letter-spacing:0; text-transform:none; transition:color 0.2s;
  }
  .counter.warn { color:rgba(255,107,138,0.75); }

  .field-input {
    width:100%; padding:13px 16px;
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(232,196,184,0.18);
    border-radius:12px; color:#f5e6d3;
    font-family:'DM Sans', sans-serif; font-size:14px;
    outline:none; transition:border-color 0.2s, box-shadow 0.2s;
  }
  .field-input::placeholder { color:rgba(245,230,211,0.22); }
  .field-input:focus { border-color:rgba(201,123,138,0.55); box-shadow:0 0 0 3px rgba(201,123,138,0.08); }
  .field-input.error { border-color:rgba(255,107,138,0.6); box-shadow:0 0 0 3px rgba(255,107,138,0.07); }

  .field-error { margin-top:5px; font-size:11px; color:#ff6b8a; min-height:16px; }

  .divider { display:flex; align-items:center; gap:12px; margin:20px 0 14px; }
  .divider-line { flex:1; height:1px; background:rgba(232,196,184,0.1); }
  .divider-text { font-size:11px; color:rgba(245,230,211,0.25); letter-spacing:0.1em; }

  .btn-login {
    width:100%; padding:14px; margin-bottom:4px;
    background:linear-gradient(135deg, #c97b8a, #ff6b8a);
    border:none; border-radius:12px; color:#fff;
    font-family:'DM Sans', sans-serif; font-size:13px;
    font-weight:500; letter-spacing:0.1em; text-transform:uppercase;
    cursor:pointer; transition:opacity 0.2s, transform 0.2s;
  }
  .btn-login:hover { opacity:0.87; transform:translateY(-1px); }
  .btn-login:active { transform:translateY(0); }

  .btn-register {
    width:100%; padding:13px; background:transparent;
    border:1px solid rgba(201,123,138,0.3); border-radius:12px;
    color:#c97b8a; font-family:'DM Sans', sans-serif;
    font-size:13px; letter-spacing:0.1em; text-transform:uppercase;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-register:hover { border-color:rgba(201,123,138,0.6); background:rgba(201,123,138,0.08); }
</style>
</head>
<body>

<button class="open-btn" onclick="openModal()">Войти в аккаунт →</button>

<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="close-btn" onclick="closeModal()">×</button>

    <div class="modal-emoji">🌸</div>
    <div class="modal-title">Добро пожаловать</div>
    <div class="modal-sub">Войдите в свой аккаунт</div>

    <div class="field">
      <div class="field-label">
        <span>Email <span class="required">*</span></span>
        <span class="counter" id="ec">0 / 80</span>
      </div>
      <input class="field-input" id="email" type="email"
        placeholder="your@email.com" maxlength="80"
        oninput="upd('email','ec',80,'ee')">
      <div class="field-error" id="ee"></div>
    </div>

    <div class="field">
      <div class="field-label">
        <span>Пароль <span class="required">*</span></span>
        <span class="counter" id="pc">0 / 64</span>
      </div>
      <input class="field-input" id="pass" type="password"
        placeholder="••••••••" maxlength="64"
        oninput="upd('pass','pc',64,'pe')">
      <div class="field-error" id="pe"></div>
    </div>

    <button class="btn-login" onclick="login()">Войти</button>

    <div class="divider">
      <div class="divider-line"></div>
      <span class="divider-text">или</span>
      <div class="divider-line"></div>
    </div>

    <button class="btn-register">Зарегистрироваться</button>
  </div>
</div>

<script>
  function openModal() {
    document.getElementById('overlay').classList.remove('hidden');
  }
  function closeModal() {
    document.getElementById('overlay').classList.add('hidden');
    ['email','pass'].forEach(id => {
      document.getElementById(id).value = '';
      document.getElementById(id).classList.remove('error');
    });
    document.getElementById('ee').textContent = '';
    document.getElementById('pe').textContent = '';
    document.getElementById('ec').textContent = '0 / 80';
    document.getElementById('pc').textContent = '0 / 64';
  }
  document.getElementById('overlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  function upd(inputId, counterId, max, errId) {
    const val = document.getElementById(inputId).value;
    const c = document.getElementById(counterId);
    c.textContent = val.length + ' / ' + max;
    c.classList.toggle('warn', val.length > max * 0.88);
    document.getElementById(inputId).classList.remove('error');
    document.getElementById(errId).textContent = '';
  }
  function login() {
    const email = document.getElementById('email');
    const pass  = document.getElementById('pass');
    let ok = true;
    if (!email.value.trim()) {
      email.classList.add('error');
      document.getElementById('ee').textContent = '⚠ Поле обязательно для заполнения';
      ok = false;
    }
    if (!pass.value.trim()) {
      pass.classList.add('error');
      document.getElementById('pe').textContent = '⚠ Поле обязательно для заполнения';
      ok = false;
    }
    if (ok) alert('✓ Вход выполнен!');
  }
</script>
</body>
</html>
